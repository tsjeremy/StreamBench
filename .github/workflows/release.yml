# .github/workflows/release.yml
#
# Builds CPU and GPU C binaries + StreamBench .NET 10 frontend for
# macOS (arm64, x64) and Windows (x64, arm64), then attaches all
# binaries to the corresponding GitHub Release.
#
# ── RELEASE VERIFICATION RULE ──────────────────────────────────────────
# Every release MUST be verified locally after CI publetes:
#   1. Download the standalone ZIP from the GitHub Release page
#   2. Run StreamBench_win_x64.exe — memory benchmark must show [PASS]
#   3. Run StreamBench_win_x64_ai.exe — AI must auto-enable and produce
#      inference results (Q1+Q2 with positive tok/s)
#   4. Compare memory bandwidth vs prior release — no regression (±5%)
# Do NOT announce a release until local verification passes.
# ───────────────────────────────────────────────────────────────────────
#
# Triggers:
#   - Push of a tag matching v*.*.*  (e.g. git push origin v5.10.04)
#   - Push to main branch (build + smoke-test only, no release)
#   - Pull requests targeting main (build + smoke-test only, no release)
#   - Manual dispatch (Actions tab -> Run workflow, supply the tag name)
#     Use manual dispatch to add binaries to a release that was created
#     before this workflow existed (e.g. v5.10.04).

name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach assets to (e.g. v5.10.04)'
        required: true

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── macOS: arm64 + x64 ───────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate VERSION matches release tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${TAG#v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::VERSION file ($FILE_VERSION) does not match release tag ($TAG_VERSION)."
            echo "Run: ./update-version.ps1 -NewVersion $TAG_VERSION"
            exit 1
          fi
          echo "✓ VERSION file ($FILE_VERSION) matches tag ($TAG)"

      - name: Install libomp
        run: brew install libomp

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build C binaries
        run: |
          OMP_PREFIX="$(brew --prefix libomp)"
          OMP="-Xpreprocessor -fopenmp -I${OMP_PREFIX}/include -L${OMP_PREFIX}/lib -lomp"
          CPU_DEFS="-DTUNED -DSTREAM_ARRAY_SIZE=200000000 -DNTIMES=100"
          GPU_DEFS="-DSTREAM_ARRAY_SIZE=200000000 -DNTIMES=100"

          # ARM64 — native on this runner, full OpenMP support
          clang -arch arm64 -O2 ${OMP} ${CPU_DEFS} -o stream_cpu_macos_arm64 stream.c
          clang -arch arm64 -O2         ${GPU_DEFS} -o stream_gpu_macos_arm64 stream_gpu.c -lm

          # x64 — cross-compiled; try with OpenMP, fall back to single-threaded
          # (arm64 Homebrew libomp may not link against an x86_64 target)
          clang -arch x86_64 -O2 ${OMP} ${CPU_DEFS} -o stream_cpu_macos_x64 stream.c 2>/dev/null \
            || clang -arch x86_64 -O2 ${CPU_DEFS} -o stream_cpu_macos_x64 stream.c
          clang -arch x86_64 -O2 ${GPU_DEFS} -o stream_gpu_macos_x64 stream_gpu.c -lm

      - name: Smoke-test C binaries
        timeout-minutes: 2
        run: |
          OMP_PREFIX="$(brew --prefix libomp)"
          OMP="-Xpreprocessor -fopenmp -I${OMP_PREFIX}/include -L${OMP_PREFIX}/lib -lomp"
          clang -O2 ${OMP} -DTUNED -DSTREAM_ARRAY_SIZE=1000 -DNTIMES=1 -o stream_cpu_test stream.c
          clang -O2 -DSTREAM_ARRAY_SIZE=1000 -DNTIMES=1 -o stream_gpu_test stream_gpu.c -lm
          echo "=== CPU smoke-test ==="
          ./stream_cpu_test
          echo "=== GPU smoke-test ==="
          ./stream_gpu_test || echo "GPU smoke-test skipped (no OpenCL device in CI)"

      - name: Validate memory benchmark accuracy (macOS)
        timeout-minutes: 2
        run: |
          # Run CPU backend and validate JSON output has correct structure and positive rates
          JSON=$(./stream_cpu_test 2>/dev/null)
          VALIDATION=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('validation',''))")
          if [ "$VALIDATION" != "passed" ]; then
            echo "FAIL: CPU benchmark validation did not pass: $VALIDATION"
            exit 1
          fi
          for OP in copy scale add triad; do
            RATE=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['results']['$OP']['best_rate_mbps'])")
            if python3 -c "exit(0 if float('$RATE') > 0 else 1)" 2>/dev/null; then
              echo "  [OK] $OP : $RATE MB/s"
            else
              echo "FAIL: $OP best_rate_mbps is invalid: $RATE"
              exit 1
            fi
          done
          echo "Memory benchmark accuracy validated - all kernels passed."

      - name: Publish StreamBench (osx-arm64, self-contained with embedded backends)
        run: |
          # Embed arm64 backends into the StreamBench binary
          mkdir -p StreamBench/backends
          cp stream_cpu_macos_arm64 stream_gpu_macos_arm64 StreamBench/backends/
          dotnet publish StreamBench/StreamBench.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:EnableAI=true --nologo -v quiet \
            -o _pub/osx-arm64
          cp _pub/osx-arm64/StreamBench StreamBench_osx-arm64
          chmod +x StreamBench_osx-arm64
          # Clean up backends and build cache so x64 publish embeds fresh resources
          rm -rf StreamBench/backends StreamBench/obj

      - name: Publish StreamBench (osx-x64, self-contained with embedded backends)
        run: |
          # Embed x64 backends into the StreamBench binary
          mkdir -p StreamBench/backends
          cp stream_cpu_macos_x64 stream_gpu_macos_x64 StreamBench/backends/
          dotnet publish StreamBench/StreamBench.csproj \
            -c Release -r osx-x64 --self-contained true \
            -p:PublishSingleFile=true -p:EnableAI=true --nologo -v quiet \
            -o _pub/osx-x64
          cp _pub/osx-x64/StreamBench StreamBench_osx-x64
          chmod +x StreamBench_osx-x64
          rm -rf StreamBench/backends

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-binaries
          path: |
            StreamBench_osx-arm64
            StreamBench_osx-x64

  # ── Windows: x64 + ARM64 (cross-compiled via MSVC) ───────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate VERSION matches release tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        shell: pwsh
        run: |
          $Tag = '${{ github.event.inputs.tag || github.ref_name }}'
          $FileVersion = (Get-Content VERSION -Raw).Trim()
          $TagVersion = $Tag.TrimStart('v')
          if ($FileVersion -ne $TagVersion) {
            Write-Error "VERSION file ($FileVersion) does not match release tag ($TagVersion). Run: .\update-version.ps1 -NewVersion $TagVersion"
            exit 1
          }
          Write-Host "✓ VERSION file ($FileVersion) matches tag ($Tag)"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Setup MSVC (x64)
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          cmd /c """$vsPath\VC\Auxiliary\Build\vcvarsall.bat"" x64 && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              $k = $matches[1]; $v = $matches[2]
              if ($k -eq 'Path') {
                $v.Split(';') | Where-Object { $_ -and ($env:Path.Split(';') -notcontains $_) } |
                  ForEach-Object { Add-Content $env:GITHUB_PATH $_ }
              } elseif ([Environment]::GetEnvironmentVariable($k, 'Process') -ne $v) {
                Add-Content $env:GITHUB_ENV "$k=$v"
              }
            }
          }

      - name: Build C binaries (x64)
        shell: cmd
        run: |
          rc.exe /nologo /fo stream_version.res stream_version.rc
          cl.exe /nologo /O2 /DTUNED /DSTREAM_ARRAY_SIZE=200000000 /DNTIMES=100 /openmp /Fe:stream_cpu_win_x64.exe stream.c stream_version.res /link advapi32.lib
          cl.exe /nologo /O2           /DSTREAM_ARRAY_SIZE=200000000 /DNTIMES=100         /Fe:stream_gpu_win_x64.exe stream_gpu.c stream_version.res /link advapi32.lib

      - name: Smoke-test C binaries (x64)
        timeout-minutes: 2
        shell: cmd
        run: |
          cl.exe /nologo /O2 /DTUNED /DSTREAM_ARRAY_SIZE=1000 /DNTIMES=1 /openmp /Fe:stream_cpu_test.exe stream.c /link advapi32.lib
          cl.exe /nologo /O2         /DSTREAM_ARRAY_SIZE=1000 /DNTIMES=1         /Fe:stream_gpu_test.exe stream_gpu.c /link advapi32.lib
          echo === CPU smoke-test ===
          stream_cpu_test.exe
          if %ERRORLEVEL% NEQ 0 exit /b 1
          echo === GPU smoke-test ===
          stream_gpu_test.exe || echo GPU smoke-test skipped - no OpenCL device in CI
          exit /b 0

      - name: Validate memory benchmark accuracy (x64)
        timeout-minutes: 2
        shell: pwsh
        run: |
          # Run CPU backend and validate JSON output has correct structure and positive rates
          $json = & .\stream_cpu_test.exe 2>$null | Out-String
          $result = $json | ConvertFrom-Json
          if ($result.validation -ne 'passed') {
            Write-Error "FAIL: CPU benchmark validation did not pass: $($result.validation)"
            exit 1
          }
          $ops = @('copy','scale','add','triad')
          foreach ($op in $ops) {
            $rate = $result.results.$op.best_rate_mbps
            if ($null -eq $rate -or $rate -le 0) {
              Write-Error "FAIL: $op best_rate_mbps is invalid: $rate"
              exit 1
            }
            Write-Host "  [OK] $op : $rate MB/s"
          }
          Write-Host "Memory benchmark accuracy validated - all kernels passed."

      # Publish win-x64 BEFORE switching to ARM64 MSVC environment,
      # otherwise the Platform=ARM64 env var from ilammy/msvc-dev-cmd
      # leaks into dotnet and conflicts with the win-x64 RID.
      - name: Publish StreamBench (win-x64, self-contained with embedded backends)
        shell: pwsh
        run: |
          # Embed x64 backends into the StreamBench binary
          New-Item -ItemType Directory -Force StreamBench/backends | Out-Null
          Copy-Item stream_cpu_win_x64.exe, stream_gpu_win_x64.exe StreamBench/backends/
          dotnet publish StreamBench/StreamBench.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true --nologo -v quiet `
            -o _pub/win-x64
          Copy-Item _pub/win-x64/StreamBench.exe StreamBench_win_x64.exe
          # Clean up backends and build cache for AI-enabled publish
          Remove-Item StreamBench/obj -Recurse -Force

      - name: Publish StreamBench (win-x64 AI-enabled)
        shell: pwsh
        run: |
          dotnet publish StreamBench/StreamBench.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:EnableAI=true --nologo -v quiet `
            -o _pub/win-x64-ai
          Copy-Item _pub/win-x64-ai/StreamBench.exe StreamBench_win_x64_ai.exe
          Remove-Item StreamBench/backends -Recurse -Force
          Remove-Item StreamBench/obj -Recurse -Force

      - name: Validate StreamBench frontend (win-x64)
        timeout-minutes: 3
        shell: pwsh
        run: |
          # Standard binary: run CPU benchmark with small array, verify success
          Write-Host "=== StreamBench frontend smoke-test ==="
          & .\StreamBench_win_x64.exe --cpu --array-size 1000 --no-save 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "FAIL: StreamBench_win_x64.exe --cpu exited with code $LASTEXITCODE"
            exit 1
          }
          Write-Host "  [OK] StreamBench_win_x64.exe --cpu passed"

          # AI binary: verify it launches without crash (--help)
          Write-Host "=== AI binary launch test ==="
          & .\StreamBench_win_x64_ai.exe --help 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "FAIL: StreamBench_win_x64_ai.exe --help exited with code $LASTEXITCODE"
            exit 1
          }
          Write-Host "  [OK] StreamBench_win_x64_ai.exe --help passed"

      - name: Setup MSVC (x64 -> ARM64 cross-compile)
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          cmd /c """$vsPath\VC\Auxiliary\Build\vcvarsall.bat"" amd64_arm64 && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              $k = $matches[1]; $v = $matches[2]
              if ($k -eq 'Path') {
                $v.Split(';') | Where-Object { $_ -and ($env:Path.Split(';') -notcontains $_) } |
                  ForEach-Object { Add-Content $env:GITHUB_PATH $_ }
              } elseif ([Environment]::GetEnvironmentVariable($k, 'Process') -ne $v) {
                Add-Content $env:GITHUB_ENV "$k=$v"
              }
            }
          }

      - name: Build C binaries (ARM64)
        shell: cmd
        run: |
          rc.exe /nologo /fo stream_version.res stream_version.rc
          cl.exe /nologo /O2 /DTUNED /DSTREAM_ARRAY_SIZE=200000000 /DNTIMES=100 /openmp /Fe:stream_cpu_win_arm64.exe stream.c stream_version.res /link advapi32.lib
          cl.exe /nologo /O2           /DSTREAM_ARRAY_SIZE=200000000 /DNTIMES=100         /Fe:stream_gpu_win_arm64.exe stream_gpu.c stream_version.res /link advapi32.lib

      - name: Publish StreamBench (win-arm64, self-contained with embedded backends)
        shell: pwsh
        run: |
          # Embed arm64 backends into the StreamBench binary
          New-Item -ItemType Directory -Force StreamBench/backends | Out-Null
          Copy-Item stream_cpu_win_arm64.exe, stream_gpu_win_arm64.exe StreamBench/backends/
          dotnet publish StreamBench/StreamBench.csproj `
            -c Release -r win-arm64 --self-contained true `
            -p:PublishSingleFile=true --nologo -v quiet `
            -o _pub/win-arm64
          Copy-Item _pub/win-arm64/StreamBench.exe StreamBench_win_arm64.exe
          Remove-Item StreamBench/obj -Recurse -Force

      - name: Publish StreamBench (win-arm64 AI-enabled)
        shell: pwsh
        run: |
          dotnet publish StreamBench/StreamBench.csproj `
            -c Release -r win-arm64 --self-contained true `
            -p:PublishSingleFile=true -p:EnableAI=true --nologo -v quiet `
            -o _pub/win-arm64-ai
          Copy-Item _pub/win-arm64-ai/StreamBench.exe StreamBench_win_arm64_ai.exe
          Remove-Item StreamBench/backends -Recurse -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-binaries
          path: |
            StreamBench_win_x64.exe
            StreamBench_win_arm64.exe
            StreamBench_win_x64_ai.exe
            StreamBench_win_arm64_ai.exe

  # ── Attach all binaries to the GitHub Release ────────────────────────────
  release:
    name: Upload Release Assets
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download macOS binaries
        uses: actions/download-artifact@v7
        with:
          name: macos-binaries
          path: release-assets/

      - name: Download Windows binaries
        uses: actions/download-artifact@v7
        with:
          name: windows-binaries
          path: release-assets/

      - name: Copy launcher files to release assets
        run: |
          cp setup.ps1 release-assets/
          cp run_stream.cmd release-assets/
          cp run_stream.ps1 release-assets/
          cp run_stream_ai.cmd release-assets/
          cp run_stream_ai.ps1 release-assets/

      - name: Create Windows standalone ZIP
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p _zip
          cp release-assets/StreamBench_win_x64.exe _zip/
          cp release-assets/StreamBench_win_arm64.exe _zip/
          cp release-assets/StreamBench_win_x64_ai.exe _zip/
          cp release-assets/StreamBench_win_arm64_ai.exe _zip/
          cp release-assets/setup.ps1 _zip/
          cp release-assets/run_stream.cmd _zip/
          cp release-assets/run_stream.ps1 _zip/
          cp release-assets/run_stream_ai.cmd _zip/
          cp release-assets/run_stream_ai.ps1 _zip/
          cd _zip && zip -9 "../release-assets/StreamBench_${TAG}_win_standalone.zip" * && cd ..

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Exclude source code archives from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.id')
          gh api --method PATCH "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -F exclude_source_code_archives=true
